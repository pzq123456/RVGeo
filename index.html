<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RVGeo: Base Example</title>
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=1.0&&type=webgl&ak=zsuRD8fmHkCdmWzC84NDbsvwAiWBdCce">

  <style>
    body{
      background: linear-gradient(90deg, #104c4f 0%, #0468428d 100%);
    }
    .title{
      position: absolute;
      top: 0px;
      right: 0px;
      height: 60px;
      width: 200px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      background: linear-gradient(90deg, #fa05ee86 0%, #06ffa06b 100%);
      border-radius: 10px;
    }
    #title{
      color: #ffffff;
      margin-left: 10px;
    }

    #toolBar{
      height: 60px;
      width: 100%;
      /* 自动滚动 */
      overflow-x: auto;
      overflow-y: auto;
      border-bottom: solid 1px #033604;
    }
    .toolBarRow{
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap : 10px;
      padding-top: 10px;
    }

    button{
      border: solid 1px #04371e;
      border-radius: 5px;
      color: rgb(26, 24, 24);
      text-align: center;
      font-size: 20px;
    }

    button:hover{
      border: solid 1px #051d33;
      background-color: #192219a5;
      color : #fefeff;
    }

    .github{
      background: linear-gradient(90deg, #fa05ee 0%, #06ffa0 100%);
      border-radius: 50%;
      border: solid 1px #ffffff;
      height: 32px;
      width: 32px;
    }
    footer{
      height: 30px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      border-top: solid 1px #1c0c0c;
    }
    .map{
      height: 830px;
      width: 100%;
    }
    /* 隐藏版权信息 */
    .BMap_cpyCtrl {
      display: none;
    }  
    .anchorBL img {
      display: none;
    }
  </style>

      </div>

      </div>
        <div id="toolBar">
